<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Localizador de Imóveis</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css" />
</head>
<body>

  <!-- LOGIN -->
  <main id="loginPage" class="login-page">
    <section class="login-card">
      <div class="app-brand">
        <div class="app-icon">🏠</div>
        <h1>Localizador de Imóveis</h1>
        <p>
          Esta aplicação foi construída para reunir e facilitar a busca sobre imóveis em todo o Brasil.
        </p>
      </div>

      <form id="loginForm" class="login-form">
        <label for="username">Usuário</label>
        <input id="username" type="text" required />

        <label for="password">Senha</label>
        <input id="password" type="password" required />

        <button type="submit">Entrar</button>

        <div id="loginMessage" class="login-message"></div>
      </form>
    </section>
  </main>

  <!-- APLICAÇÃO -->
  <main id="appContainer" class="app-container hidden">

    <header class="app-header">

      <div class="header-left">
        <span class="logo">🏠</span>
        <span class="title">Localizador de Imóveis</span>
      </div>

      <div class="header-right">
        <button id="helpButton">Ajuda</button>
        <button id="profileButton">Usuário</button>
      </div>

    </header>

    <div class="app-content">

      <aside class="sidebar">

        <h2>Filtros</h2>

        <p>
          Painel estatístico será implementado nas próximas etapas.
        </p>

      </aside>

      <section class="map-container">

<div id="viewDiv"></div>

      </section>

    </div>

  </main>

<script src="js/config.js"></script>
<script src="https://js.arcgis.com/4.30/"></script>
<script src="js/auth.js"></script>
<script src="js/map.js"></script>
<script src="js/app.js"></script>

</body>
</html>
