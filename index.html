<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Localizador de Imóveis</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="app-brand">
        <div class="app-icon">🏠</div>
        <h1>Localizador de Imóveis</h1>
        <p>
          Esta aplicação foi construída para reunir e facilitar a busca sobre imóveis em todo o Brasil.
        </p>
      </div>

      <form id="loginForm" class="login-form">
        <label for="username">Usuário</label>
        <input id="username" type="text" placeholder="Informe seu usuário" required />

        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="Informe sua senha" required />

        <button type="submit">Entrar</button>

        <div id="loginMessage" class="login-message"></div>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
